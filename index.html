<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manali Eid Special Offer</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f5f5;
text-align:center;
}

.hero{
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
padding:50px 20px;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.price{
font-size:35px;
color:#ffeb3b;
font-weight:bold;
}

video{
width:100%;
max-height:500px;
object-fit:cover;
}

.section{
padding:30px;
}

.box{
background:white;
margin:20px auto;
padding:25px;
max-width:600px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.btn{
display:inline-block;
padding:15px 30px;
background:#25D366;
color:white;
border:none;
border-radius:50px;
font-size:18px;
margin-top:15px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#1ebe5d;
}

footer{
background:#222;
color:white;
padding:20px;
margin-top:30px;
}
</style>
</head>

<body>

<div class="hero">
<h1>Aligarh / Delhi to Manali</h1>
<h2>Eid Special 4 Days Tour</h2>
<p class="price">Just ₹7999 Per Person</p>
</div>

<video autoplay muted loop>
<source src="yourvideo.mp4" type="video/mp4">
</video>

<div class="section">

<div class="box">
<h3>Package Includes</h3>
<p>
✔ Volvo Travel <br>
✔ 3 Nights Hotel Stay <br>
✔ Local Sightseeing <br>
✔ Breakfast & Dinner <br>
✔ Snow Point Visit
</p>
</div>

<div class="box">
<h3>Book Your Seat Now</h3>

<form onsubmit="sendToWhatsApp(); return false;">

<input type="text" id="name" placeholder="Your Name" required>
<input type="tel" id="phone" placeholder="Your WhatsApp Number" required>
<input type="email" id="email" placeholder="Your Email Address" required>

<button type="submit" class="btn">Submit & Book Now</button>

</form>

</div>

</div>

<footer>
© 2026 Manali Tour Offer | Limited Eid Seats Available
</footer>

<script>
function sendToWhatsApp(){

var name = document.getElementById("name").value;
var phone = document.getElementById("phone").value;
var email = document.getElementById("email").value;

var message = "New Manali Eid Booking Lead:%0A%0A"
+ "Name: " + name + "%0A"
+ "Customer WhatsApp: " + phone + "%0A"
+ "Email: " + email;

var yourNumber = "919756377412"; 

var url = "https://wa.me/" + yourNumber + "?text=" + message;

window.open(url, '_blank');

}
</script>

</body>
</html>
